<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E2A47"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="30" y1="20" x2="90" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#29B6F6"/>
    </linearGradient>
    <linearGradient id="pulse" x1="60" y1="30" x2="60" y2="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="56" fill="url(#bg)" stroke="url(#accent)" stroke-width="2.5" opacity="0.95"/>
  <!-- Inner ring -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(79,195,247,0.15)" stroke-width="1"/>
  <!-- Medical cross -->
  <rect x="52" y="28" width="16" height="40" rx="3" fill="url(#accent)" opacity="0.9"/>
  <rect x="40" y="40" width="40" height="16" rx="3" fill="url(#accent)" opacity="0.9"/>
  <!-- Heartbeat line / pulse -->
  <polyline points="24,78 38,78 44,68 50,88 56,72 62,82 68,74 74,78 96,78" stroke="url(#pulse)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Subtle data dots -->
  <circle cx="38" cy="78" r="2" fill="#81D4FA" opacity="0.7"/>
  <circle cx="74" cy="78" r="2" fill="#81D4FA" opacity="0.7"/>
</svg>
